<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="/Online-Fashon-Store/assets/css/ShoppingCart.css">
    <link rel="stylesheet" href="/Online-Fashon-Store/assets/css/header.css">
    <link rel="stylesheet" href="/Online-Fashon-Store/assets/css/footer.css">
</head>
<body>
    <div class="cart-container">
        <h1>Shopping cart</h1>
        <div class="cart-items">
            <div class="cart-item">
                <img src="blue-denim-shirt.jpg" alt="Blue Denim Shirt">
                <div class="item-details">
                    <h2>Blue denim shirt</h2>
                    <p><strong>Shirt</strong> - Blue</p>
                    <p>Size: M</p>
                    <p>$17.99</p>
                    <div class="quantity">
                        <button class="minus">-</button>
                        <input type="text" value="1">
                        <button class="plus">+</button>
                    </div>
                    <button class="remove-item">Remove Item</button>
                    <button class="wishlist">Move to Wishlist</button>
                </div>
            </div>
            <div class="cart-item">
                <img src="red-hoodie.jpg" alt="Red Hoodie">
                <div class="item-details">
                    <h2>Red hoodie</h2>
                    <p><strong>Hoodie</strong> - Red</p>
                    <p>Size: M</p>
                    <p>$35.99</p>
                    <div class="quantity">
                        <button class="minus">-</button>
                        <input type="text" value="1">
                        <button class="plus">+</button>
                    </div>
                    <button class="remove-item">Remove Item</button>
                    <button class="wishlist">Move to Wishlist</button>
                </div>
            </div>
        </div>
        <div class="cart-summary">
            <h3>The total amount of</h3>
            <p>Temporary amount: <span>$53.98</span></p>
            <p>Shipping: <span>Gratis</span></p>
            <h3>Total (including VAT): <span>$53.98</span></h3>
            <button class="checkout">Go to Checkout</button>
        </div>
    </div>

    <footer>
        <a href="/Online-Fashon-Store/pages/info/AboutUs.html">About Us</a> |
        <a href="ContactUs.html">Contact Us</a> |
        <a href="/Online-Fashon-Store/pages/info/Terms&Conditions.html">Terms & Conditions</a> |
        <a href="FAQs.html">FAQs</a>
    </footer>
</body>
</html>
